name: reelboost_ai
description: ReelBoost AI — AI-powered assistant for Instagram creators (Flutter + Node API).
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  image_picker: ^1.1.2
  video_player: ^2.9.2
  video_thumbnail: ^0.5.6
  app_links: ^6.4.0
  shared_preferences: ^2.3.4
  google_mobile_ads: ^5.3.1
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
